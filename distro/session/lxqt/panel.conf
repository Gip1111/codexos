[General]
__userfile__=true
panels=topbar,dock

[topbar]
alignment=-1
animation-duration=0
background-color=@Variant(\0\0\0\x43\x1\xff\xff\r\r\x11\x11\x18\x18\xf2\xf2\0\0)
desktop=0
font-color=@Variant(\0\0\0\x43\x1\xff\xff\xf8\xf8\xfa\xfa\xfc\xfc\0\0)
hidable=false
iconSize=22
lineCount=1
lockPanel=false
opacity=96
panelSize=34
plugins=mainmenu,spacer_left,desktopswitch,spacer_right,tray,statusnotifier,volume,worldclock
position=Top
reserve-space=true
screen=0
show-delay=0
visible-margin=false
width=100
width-percent=true

[dock]
alignment=0
animation-duration=160
background-color=@Variant(\0\0\0\x43\x1\xff\xff\x10\x10\x17\x17\x21\x21\xe8\xe8\0\0)
desktop=0
font-color=@Variant(\0\0\0\x43\x1\xff\xff\xf8\xf8\xfa\xfa\xfc\xfc\0\0)
hidable=true
hide-delay=250
iconSize=38
lineCount=1
lockPanel=false
opacity=92
panelSize=74
plugins=quicklaunch_dock
position=Bottom
reserve-space=false
screen=0
show-delay=80
visible-margin=true
width=50
width-percent=true

[mainmenu]
type=mainmenu
alignment=Left
showText=true
text=Aurion

[quicklaunch]
type=quicklaunch
apps\1\desktop=/usr/share/applications/aurion-launcher.desktop
apps\2\desktop=/usr/share/applications/aurion-store.desktop
apps\3\desktop=/usr/share/applications/aurion-hardware-center.desktop
apps\4\desktop=/usr/share/applications/aurion-ai-sidebar.desktop
apps\size=4

[spacer_left]
type=spacer
expand=true

[spacer_right]
type=spacer
expand=true

[taskbar]
type=taskbar
buttonWidth=180
closeOnMiddleClick=true
groupingEnabled=true
raiseOnCurrentDesktop=true
showOnlyCurrentDesktopTasks=false

[tray]
type=tray

[statusnotifier]
type=statusnotifier

[volume]
type=volume

[worldclock]
type=worldclock
format=HH:mm
showDate=false
timezone=local

[showdesktop]
type=showdesktop

[quicklaunch_dock]
type=quicklaunch
apps\1\desktop=/usr/share/applications/aurion-launcher.desktop
apps\2\desktop=/usr/share/applications/aurion-experience.desktop
apps\3\desktop=/usr/share/applications/aurion-browser.desktop
apps\4\desktop=/usr/share/applications/aurion-files.desktop
apps\5\desktop=/usr/share/applications/aurion-terminal.desktop
apps\6\desktop=/usr/share/applications/aurion-store.desktop
apps\7\desktop=/usr/share/applications/aurion-installer.desktop
apps\8\desktop=/usr/share/applications/aurion-ai-sidebar.desktop
apps\size=8

[spacer_dock]
type=spacer
expand=true

[desktopswitch]
type=desktopswitch
