[General]
window_manager=openbox
leave_confirmation=false

[Environment]
DESKTOP_SESSION=AurionOS
XDG_SESSION_DESKTOP=AurionOS
XDG_CURRENT_DESKTOP=LXQt:AurionOS

[Modules]
lxqt-runner=true
lxqt-globalkeysd=true
lxqt-notificationd=true
lxqt-panel=true
lxqt-policykit-agent=true
lxqt-powermanagement=true
pcmanfm-desktop=true

[Mouse]
cursor_follows_focus=false
double_click_interval=400
wheel_scroll_lines=3

[Keyboard]
delay=500
interval=30
beep=false
